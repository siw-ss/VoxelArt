<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Archipelago — Sky Islands Voxel Scene</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏝️</text></svg>"
    />
  </head>
  <body>
    <div id="app"></div>

    <div id="overlay">
      <div class="title-card">
        <h1>Floating<br />Archipelago</h1>
        <p class="subtitle">Sky Islands &amp; Crystal Bridges</p>
      </div>
    </div>

    <div id="desc-card">
      <span class="desc-label">About this scene</span>
      <span class="desc-text" id="typewriter"></span
      ><span class="cursor" id="tw-cursor"></span>
    </div>

    <div id="dock" role="toolbar" aria-label="Scene controls">
      <label class="dock-item toggle" title="Auto-orbit">
        <input type="checkbox" id="rotate" checked />
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12a9 9 0 1 1-3-6.7" />
            <path d="M21 3v5h-5" />
          </svg>
        </span>
        <span class="tip">Auto-orbit</span>
      </label>

      <label class="dock-item toggle" title="Waterfalls">
        <input type="checkbox" id="waterfalls" checked />
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M7 2v6M12 2v10M17 2v4" />
            <path d="M7 12v4M12 16v4M17 10v8" opacity="0.6" />
            <path d="M3 20c2-2 4-2 6 0s4 2 6 0 4-2 6 0" />
          </svg>
        </span>
        <span class="tip">Waterfalls</span>
      </label>

      <label class="dock-item toggle" title="Gravity shift">
        <input type="checkbox" id="gravity" />
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 2v8M12 14v8" />
            <path d="M8 6l4-4 4 4" />
            <path d="M8 18l4 4 4-4" />
          </svg>
        </span>
        <span class="tip">Gravity shift</span>
      </label>

      <label class="dock-item toggle" title="Night mode">
        <input type="checkbox" id="night-mode" />
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </span>
        <span class="tip">Night mode</span>
      </label>

      <div class="dock-sep"></div>

      <div
        class="dock-item sun-item"
        id="sun-btn"
        title="Time of day"
        tabindex="0"
      >
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4.2" />
            <path
              d="M12 2v2.4M12 19.6V22M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2 12h2.4M19.6 12H22M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"
            />
          </svg>
        </span>
        <span class="tip">Time of day</span>
      </div>

      <div class="dock-item" id="chick-btn" title="Chick count" tabindex="0">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <circle
              cx="12"
              cy="11"
              r="5"
              fill="#FFE040"
              stroke="#E8A020"
              stroke-width="0.8"
            />
            <circle
              cx="12"
              cy="8"
              r="3.2"
              fill="#FFE040"
              stroke="#E8A020"
              stroke-width="0.8"
            />
            <polygon points="12,9.5 10.5,10.5 13.5,10.5" fill="#F08010" />
            <circle cx="10.8" cy="7.5" r="0.6" fill="#1A1010" />
            <circle cx="13.2" cy="7.5" r="0.6" fill="#1A1010" />
          </svg>
        </span>
        <span class="tip">Chick count</span>
      </div>

      <label class="dock-item toggle" title="Home view">
        <input type="checkbox" id="home-view" />
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </span>
        <span class="tip">Home</span>
      </label>
    </div>

    <!-- Sun/time panel -->
    <div class="sun-flyout" id="sun-panel">
      <svg
        class="sun-arc"
        viewBox="0 0 200 60"
        fill="none"
        style="width: 100%; height: 42px; margin-bottom: 8px"
      >
        <path
          d="M10 55 Q100 -15 190 55"
          stroke="rgba(255,255,255,0.12)"
          stroke-width="2"
          fill="none"
          stroke-dasharray="4 4"
        />
        <circle id="sun-dot" cx="120" cy="18" r="7" fill="url(#sun-grad)" />
        <defs>
          <radialGradient id="sun-grad">
            <stop offset="0%" stop-color="#fff" />
            <stop offset="100%" stop-color="#ffd24a" />
          </radialGradient>
        </defs>
      </svg>
      <div class="sun-head">
        <span>Time of day</span><b id="sun-val">Midday</b>
      </div>
      <input type="range" id="sun" min="0" max="100" value="62" />
      <div
        style="
          text-align: center;
          margin-top: 8px;
          font-size: 10px;
          color: rgba(255, 255, 255, 0.4);
          letter-spacing: 0.5px;
        "
      >
        Drag to move the sun across the sky
      </div>
    </div>

    <!-- Chick count panel -->
    <div class="chick-flyout" id="chick-panel">
      <div class="sun-head">
        <span>Chick count</span><b id="chick-val">3</b>
      </div>
      <input
        type="range"
        id="chick-count"
        min="3"
        max="900"
        value="3"
        step="1"
      />
      <div
        style="
          text-align: center;
          margin-top: 8px;
          font-size: 10px;
          color: rgba(255, 255, 255, 0.4);
          letter-spacing: 0.5px;
        "
      >
        Adjust the number of baby chicks
      </div>
    </div>

    <div id="hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>
    <div id="loader"><div id="loader-msg">Building sky islands…</div></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
