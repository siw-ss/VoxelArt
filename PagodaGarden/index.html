<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cherry Blossom Pagoda Garden — Voxel Scene</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Noto+Serif+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>"
    />
  </head>
  <body>
    <div id="app"></div>

    <div id="overlay">
      <div class="title-card">
        <h1>Cherry Blossom<br />Pagoda Garden</h1>
        <p class="subtitle-jp">桜の塔と庭園</p>
      </div>
    </div>

    <div id="desc-card">
      <span class="desc-label">About this scene</span>
      <span class="desc-text" id="typewriter"></span
      ><span class="cursor" id="tw-cursor"></span>
    </div>

    <div id="dock" role="toolbar" aria-label="Scene controls">
      <label class="dock-item toggle sun-spin" title="Auto-orbit">
        <input type="checkbox" id="rotate" checked />
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12a9 9 0 1 1-3-6.7" />
            <path d="M21 3v5h-5" />
          </svg>
        </span>
        <span class="tip">Auto-orbit</span>
      </label>

      <label class="dock-item toggle" title="Falling petals">
        <input type="checkbox" id="petals" checked />
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 3c2.2 1.8 3.4 4 3.4 6.2A3.4 3.4 0 0 1 12 12.6a3.4 3.4 0 0 1-3.4-3.4C8.6 7 9.8 4.8 12 3Z"
            />
            <circle cx="6.4" cy="15.6" r="2.1" opacity="0.85" />
            <circle cx="17.4" cy="16.4" r="1.7" opacity="0.7" />
            <circle cx="11" cy="20" r="1.4" opacity="0.6" />
          </svg>
        </span>
        <span class="tip">Falling petals</span>
      </label>

      <label class="dock-item toggle" title="Shadows">
        <input type="checkbox" id="shadows" checked />
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="9" cy="9" r="5.5" />
            <path d="M14 18.5a5.5 5.5 0 1 0 0-9" opacity="0.5" />
          </svg>
        </span>
        <span class="tip">Shadows</span>
      </label>

      <div class="dock-sep"></div>

      <div
        class="dock-item sun-item"
        id="sun-btn"
        title="Sun position"
        tabindex="0"
      >
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4.2" />
            <path
              d="M12 2v2.4M12 19.6V22M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2 12h2.4M19.6 12H22M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"
            />
          </svg>
        </span>
        <span class="tip">Sun &amp; time of day</span>
      </div>

      <div
        class="dock-item petals-item"
        id="petals-btn"
        title="Petal count"
        tabindex="0"
      >
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v1M12 20v1M4.22 4.22l.7.7M19.07 19.07l.71.71M3 12H2M22 12h-1M4.93 19.07l-.71.71M19.78 4.93l-.7-.71" opacity="0.5"/>
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 8c0-1.5.8-3 2-4M12 8c0-1.5-.8-3-2-4M16 12c1.5 0 3 .8 4 2M16 12c1.5 0 3-.8 4-2M12 16c0 1.5.8 3 2 4M12 16c0 1.5-.8 3-2 4M8 12c-1.5 0-3 .8-4 2M8 12c-1.5 0-3-.8-4-2" opacity="0.7"/>
          </svg>
        </span>
        <span class="tip">Petal count</span>
      </div>

      <label class="dock-item toggle" title="Home view">
        <input type="checkbox" id="home-view" />
        <span class="ico" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </span>
        <span class="tip">Home</span>
      </label>
    </div>

    <!-- Sun panel — lives OUTSIDE the dock so magnification can't affect it -->
    <div class="sun-flyout" id="sun-panel">
      <svg
        class="sun-arc"
        viewBox="0 0 200 60"
        fill="none"
        style="width: 100%; height: 42px; margin-bottom: 8px"
      >
        <path
          d="M10 55 Q100 -15 190 55"
          stroke="rgba(255,255,255,0.12)"
          stroke-width="2"
          fill="none"
          stroke-dasharray="4 4"
        />
        <circle id="sun-dot" cx="120" cy="18" r="7" fill="url(#sun-grad)" />
        <defs>
          <radialGradient id="sun-grad">
            <stop offset="0%" stop-color="#fff" />
            <stop offset="100%" stop-color="#ffd24a" />
          </radialGradient>
        </defs>
      </svg>
      <div class="sun-head">
        <span>Time of day</span><b id="sun-val">Midday</b>
      </div>
      <input type="range" id="sun" min="0" max="100" value="62" />
      <div
        style="
          text-align: center;
          margin-top: 8px;
          font-size: 10px;
          color: rgba(255, 255, 255, 0.4);
          letter-spacing: 0.5px;
        "
      >
        Drag to move the sun across the sky
      </div>
    </div>

    <!-- Petals panel — lives OUTSIDE the dock so magnification can't affect it -->
    <div class="petals-flyout" id="petals-panel">
      <div class="sun-head">
        <span>Petal count</span><b id="petals-val">900</b>
      </div>
      <input type="range" id="petals-count" min="10" max="900" value="900" step="10" />
      <div
        style="
          text-align: center;
          margin-top: 8px;
          font-size: 10px;
          color: rgba(255, 255, 255, 0.4);
          letter-spacing: 0.5px;
        "
      >
        Adjust the number of falling petals
      </div>
    </div>

    <div id="hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>
    <div id="loader"><div id="loader-msg">Growing the garden…</div></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
